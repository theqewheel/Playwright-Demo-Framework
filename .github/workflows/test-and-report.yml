name: Playwright TestNG Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Playwright_Demo_Framework

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium"

      - name: Run tests
        run: mvn test
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        run: |
          mvn allure:report
          echo "=== target/site contents ==="
          ls -la target/site/ || echo "no site folder"
          ls -la target/site/allure-maven-plugin/ || echo "no allure-maven-plugin folder"

      - name: Get test summary
        if: always()
        id: summary
        run: |
          TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; BROKEN=0
          SEEN_CLASSES=""

          for f in $(find target/surefire-reports -name "TEST-*.xml" 2>/dev/null | sort); do

            # ã Extract short class name from file
            CLASS=$(grep -oP 'classname="\K[^"]+' "$f" | head -1 | awk -F. '{print $NF}')

            # ã Deduplication ã parallel runs generate multiple XMLs for same class
            # We skip any class we have already counted
            if echo "$SEEN_CLASSES" | grep -qw "$CLASS"; then
              echo "ãÙ Skipping duplicate XML for: $CLASS"
              continue
            fi
            SEEN_CLASSES="$SEEN_CLASSES $CLASS"

            # ã Count <testcase lines directly ã not tests= attribute on <testsuite>
            # tests= attribute gets duplicated across summary + class XMLs
            # <testcase lines are always exactly 1 per real test method
            while IFS= read -r line; do
              TOTAL=$((TOTAL + 1))
              if echo "$line" | grep -q "<failure"; then
                FAILED=$((FAILED + 1))
              elif echo "$line" | grep -q "<error"; then
                BROKEN=$((BROKEN + 1))
              elif echo "$line" | grep -q "<skipped"; then
                SKIPPED=$((SKIPPED + 1))
              else
                PASSED=$((PASSED + 1))
              fi
            done < <(grep '<testcase ' "$f")
          done

          if [ "$FAILED" -eq 0 ] && [ "$BROKEN" -eq 0 ]; then
            STATUS="ã PASSED"
          else
            STATUS="ã FAILED"
          fi

          echo "total=$TOTAL"     >> $GITHUB_OUTPUT
          echo "passed=$PASSED"   >> $GITHUB_OUTPUT
          echo "failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "broken=$BROKEN"   >> $GITHUB_OUTPUT
          echo "status=$STATUS"   >> $GITHUB_OUTPUT
          # Human readable ã used in email subject and body
          echo "date=$(date +'%d %b %Y %H:%M UTC')"      >> $GITHUB_OUTPUT
          # Safe date ã no colons/spaces ã used for artifact name only
          echo "safe_date=$(date +'%d-%b-%Y_%H%M-UTC')"  >> $GITHUB_OUTPUT
